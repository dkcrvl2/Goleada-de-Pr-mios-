    <h1>🏆 GOLEADA DE PRÊMIOS</h1>
    <p class="slogan">Seu palpite vale ouro!</p>

    <div class="jogo">
      <h2>🇧🇷 Brasil × 🇳🇴 Noruega</h2>
      <p>📅 Domingo • 05/07/2026</p>
      <p>🕓 16:00</p>
    </div>

    <div class="valor">
      <h3>💰 Participação</h3>
      <p>R$ 5,00</p>
    </div>

    <button>PARTICIPAR AGORA</button>
<div class="formulario">
  <h3>📝 Faça seu palpite</h3>

  <input type="text" id="nome" placeholder="Nome completo">

  <input type="tel" id="whatsapp" placeholder="WhatsApp">

  <div class="placar">
    <input type="number" id="brasil" placeholder="Brasil">
    <span>X</span>
    <input type="number" id="noruega" placeholder="Noruega">
  </div>

  <button onclick="enviarPalpite()">Enviar Palpite</button>
</div>
    <div class="regras">
      <h3>📜 Regras</h3>
      <p>✔️ Acertou o placar exato? Ganhou!</p>
      <p>✔️ 20% para o organizador.</p>
      <p>✔️ 80% para o(s) vencedor(es).</p>
    </div>

<script src="script.js"></script>
</body>
</html>
